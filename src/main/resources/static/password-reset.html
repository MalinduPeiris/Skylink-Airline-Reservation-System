<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style> body{font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 16px;} form{display:grid; gap:12px;} input, button{padding:10px;} </style>
</head>
<body>
<h2>Reset Password</h2>
<form method="post" action="/api/auth/password-reset">
  <label>Email <input type="email" name="email" required /></label>
  <label>New Password <input type="password" name="newPassword" required /></label>
  <button type="submit">Reset</button>
  <div th:if="${error}" style="color:#b00020" th:text="${error}"></div>
  <div th:if="${success}" style="color:#006400" th:text="${success}"></div>
  <p><a href="/api/auth/login">Back to login</a></p>
</form>
</body>
</html>
