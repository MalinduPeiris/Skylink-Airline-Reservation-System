<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style> body{font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 16px;} form{display:grid; gap:12px;} input, button{padding:10px;} </style>
</head>
<body>
  <h2>Process Payment</h2>
  <form method="post" action="/api/payment/process">
    <input type="hidden" name="bookingId" th:value="${bookingId}" />
    <label>Amount <input name="amount" type="number" step="0.01" required></label>
    <button type="submit">Pay</button>
  </form>
</body>
</html>
