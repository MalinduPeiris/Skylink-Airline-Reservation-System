<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flight Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style> body{font-family: Arial, sans-serif; max-width: 900px; margin: 20px auto; padding: 0 16px;} table{width:100%; border-collapse: collapse;} th, td{border:1px solid #ddd; padding:8px;} th{background:#f3f3f3} </style>
</head>
<body>
  <h2>Flights</h2>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>From</th>
        <th>To</th>
        <th>Depart</th>
        <th>Arrive</th>
        <th>Cabin</th>
        <th>Price</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="f : ${flights}">
        <td th:text="${f.flightNumber}">SK100</td>
        <td th:text="${f.origin}">SIN</td>
        <td th:text="${f.destination}">HKG</td>
        <td th:text="${f.departureDate}">2025-01-01</td>
        <td th:text="${f.arrivalDate}">2025-01-01</td>
        <td th:text="${f.cabinClass}">ECONOMY</td>
        <td th:text="${f.price}">199.0</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
