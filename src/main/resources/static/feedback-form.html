<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style> body{font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 16px;} form{display:grid; gap:12px;} input, textarea, button{padding:10px;} </style>
</head>
<body>
<h2>Submit Feedback</h2>
<form method="post" action="/api/feedback/submit">
  <label>Rating (1-5) <input type="number" name="rating" min="1" max="5" required></label>
  <label>Comments <textarea name="comments" rows="4"></textarea></label>
  <input type="hidden" name="userId" value="1" />
  <button type="submit">Submit</button>
</form>
</body>
</html>
